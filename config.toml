title = "Kast Programming Language"

# The URL the site will be built for
base_url = "https://kast-lang.org"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

[markdown]
# Whether to do syntax highlighting
# Theme can be customised by setting the `highlight_theme` variable to a theme supported by Zola
highlight_code = true
highlight_theme = "one-dark"

[extra]
# Put all your custom variables here
logo_name = "Kast"
logo_path = "logo.svg"
extra_menu = [
    { title = "Install", link = "/install" },
    { title = "Playground", link = "https://play.kast-lang.org" },
    { title = "Learn", link = "/learn" },
    { title = "Blog", link = "/blog" },
    { title = "Github", link = "https://github.com/kast-lang/kast" },
]
exclude_menu = ["exclude_from_nav"]
repository_url = "https://github.com/kast-lang/kast"
